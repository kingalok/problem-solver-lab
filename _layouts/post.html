---
layout: default
---
<article class="post-article">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.tags %} | {{ page.tags | join: " | " }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  {% if page.cover_image %}
  <figure class="post-cover">
    <img src="{{ page.cover_image | relative_url }}" alt="{{ page.cover_alt | default: page.title }}" />
    {% if page.cover_caption %}
    <figcaption>{{ page.cover_caption }}</figcaption>
    {% endif %}
  </figure>
  {% endif %}

  <section class="post-body">
    {{ content }}
  </section>
</article>
